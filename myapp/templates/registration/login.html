{% extends "myapp/base.html" %}

{% block title %}Login – FinDish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4">
            <h3 class="fw-bold text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> Welcome Back</h3>

            {% if form.errors %}
            <div class="alert alert-danger small">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label small fw-semibold">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label small fw-semibold">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn-fm w-100"><i class="bi bi-box-arrow-in-right"></i> Login</button>
            </form>

            <p class="text-center mt-3 mb-0 small">
                Don't have an account? <a href="{% url 'register' %}">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
