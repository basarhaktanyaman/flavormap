{% extends "myapp/base.html" %}

{% block title %}Contact – FinDish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="fw-bold mb-4"><i class="bi bi-envelope"></i> Contact Us</h1>

        <div class="row g-4">
            <!-- Contact Info -->
            <div class="col-md-5">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">Get in Touch</h5>
                    <ul class="list-unstyled">
                        <li class="mb-3">
                            <i class="bi bi-envelope-fill text-primary me-2"></i>
                            <strong>Email</strong><br>
                            <span class="text-muted">Bbuyuknacar27@hotmail.com</span>
                        </li>
                        <li class="mb-3">
                            <i class="bi bi-telephone-fill text-success me-2"></i>
                            <strong>Phone</strong><br>
                            <span class="text-muted">+90 530 204 8689 (Batuhan Büyüknacar)</span>
                        </li>
                        <li class="mb-3">
                            <i class="bi bi-geo-alt-fill text-danger me-2"></i>
                            <strong>Address</strong><br>
                            <span class="text-muted">Istanbul, Turkey</span>
                        </li>
                    </ul>
                    <div class="mt-auto">
                        <h6 class="fw-bold">Follow Us</h6>
                        <a href="#" class="text-dark me-2 fs-5"><i class="bi bi-twitter-x"></i></a>
                        <a href="#" class="text-dark me-2 fs-5"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-dark me-2 fs-5"><i class="bi bi-facebook"></i></a>
                    </div>
                </div>
            </div>

            <!-- Contact Form (front-end only) -->
            <div class="col-md-7">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">Send a Message</h5>
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Full Name</label>
                            <input type="text" class="form-control" placeholder="Your name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Email</label>
                            <input type="email" class="form-control" placeholder="your@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Subject</label>
                            <input type="text" class="form-control" placeholder="How can we help?">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Message</label>
                            <textarea class="form-control" rows="4" placeholder="Your message..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-fm w-100">
                            <i class="bi bi-send"></i> Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
