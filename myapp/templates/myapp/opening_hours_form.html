{% extends "myapp/base.html" %}

{% block title %}Opening Hours – {{ restaurant.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card p-4">
            <h3 class="fw-bold mb-2"><i class="bi bi-clock"></i> Opening Hours</h3>
            <p class="text-muted mb-3">{{ restaurant.name }}</p>

            <form method="post">
                {% csrf_token %}
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Day</th>
                            <th>Open</th>
                            <th>Close</th>
                            <th class="text-center">Closed</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in rows %}
                        <tr>
                            <td>{{ row.label }}</td>
                            <td><input type="time" name="day_{{ row.day }}_open" value="{{ row.open_time|date:'H:i'|default:'' }}" class="form-control form-control-sm"></td>
                            <td><input type="time" name="day_{{ row.day }}_close" value="{{ row.close_time|date:'H:i'|default:'' }}" class="form-control form-control-sm"></td>
                            <td class="text-center">
                                <input type="checkbox" name="day_{{ row.day }}_is_closed" class="form-check-input" {% if row.is_closed %}checked{% endif %}>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-fm"><i class="bi bi-check2-circle"></i> Save Hours</button>
                    <a href="{% url 'myapp:restaurant_detail' restaurant.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
